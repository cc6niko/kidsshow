        .contact-container {
            padding: 60px 8%;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        
        .contact-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 40px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .contact-card {
            background: #ffffff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 20px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: left;
        }

        .contact-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* Loqo Sahəsi */
        .contact-icon-wrapper {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .contact-icon-wrapper svg {
            width: 100%;
            height: 100%;
        }

        .card-details h3 {
            margin: 0 0 5px 0;
            font-size: 18px;
            color: #333;
        }

        .card-details p {
            margin: 0;
            font-size: 15px;
            color: #666;
        }

        /* Əlaqə düyməsinin düzgün durması üçün CSS sığortası */
        .nav-cta {
            display: inline-block !important;
            transform: none !important;
            writing-mode: horizontal-tb !important;
        }
    </style>
</head>
