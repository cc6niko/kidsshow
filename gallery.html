    <style>
        .gallery-container { padding: 60px 8%; }
        
        /* Masonry Grid (Müasir Şəkil Düzülüşü) */
        .masonry-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            grid-auto-rows: 250px;
            gap: 20px;
        }
        .masonry-item { 
            border-radius: 16px; 
            overflow: hidden; 
            position: relative; 
            cursor: pointer; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); 
            background: #f1f1f1;
        }
        .masonry-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: transform 0.5s ease; 
        }
        .masonry-item:hover img { 
            transform: scale(1.08); 
        }
        
        /* Dizayna fərqlilik qatan böyük və uzun kartlar */
        .masonry-item.tall { grid-row: span 2; }
        .masonry-item.wide { grid-column: span 2; }

        /* Lightbox Modalı (Şəkil böyüdücü panel) */
        .lightbox { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.9); 
            z-index: 2000; 
            align-items: center; 
            justify-content: center; 
        }
        .lightbox img { 
            max-width: 90%; 
            max-height: 80%; 
            border-radius: 8px; 
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
        }
        .lightbox-close { 
            position: absolute; 
            top: 30px; 
            right: 40px; 
            color: white; 
            font-size: 40px; 
            cursor: pointer; 
        }
        
        @media (max-width: 768px) {
            .masonry-item.wide { grid-column: span 1; }
        }
    </style>
</head>
