<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Əlaqə | Kids Show</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-container {
            padding: 60px 8%;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        
        .contact-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 40px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .contact-card {
            background: #ffffff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 20px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: left;
        }

        .contact-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .contact-icon {
            font-size: 35px;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        /* Sosial Şəbəkələrin Rəngləri */
        .wp-card .contact-icon { background: #e8f5e9; color: #25D366; }
        .insta-card .contact-icon { background: #fce4ec; color: #E1306C; }
        .tiktok-card .contact-icon { background: #eceff1; color: #000000; }

        .card-details h3 {
            margin: 0 0 5px 0;
            font-size: 18px;
            color: #333;
        }

        .card-details p {
            margin: 0;
            font-size: 15px;
            color: #666;
        }

        /* Əlaqə düyməsinin düzgün durması üçün CSS sığortası */
        .nav-cta {
            display: inline-block !important;
            transform: none !important;
            writing-mode: horizontal-tb !important;
        }
    </style>
</head>
<body>

        <nav>

                <li><a href="faq.html">FAQ</a></li>
                <li><a href="contact.html" class="nav-cta active">Əlaqə</a></li>

        <div class="contact-grid">
            
            <a href="https://wa.me/994773282029" target="_blank" class="contact-card wp-card">
                <div class="contact-icon">💬</div>
                <div class="card-details">
                    <h3>WhatsApp</h3>
                    <p>+994 (77) 328-20-29</p>
                </div>
            </a>

            <a href="https://www.instagram.com/_.kids.show._?igsh=MWF3dDd5bzZmcnJxOQ==" target="_blank" class="contact-card insta-card">
                <div class="contact-icon">📸</div>
                <div class="card-details">
                    <h3>Instagram</h3>
                    <p>@_.kids.show._</p>
                </div>
            </a>

            <a href="https://www.tiktok.com/@_hiss.elemirem_?_r=1&_t=ZS-970ieKTy6AK" target="_blank" class="contact-card tiktok-card">
                <div class="contact-icon">🎵</div>
                <div class="card-details">
